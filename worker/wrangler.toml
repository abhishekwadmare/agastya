name = "agastya-admin"
main = "src/index.js"
compatibility_date = "2024-09-01"

# Non-secret configuration - safe to commit, these are not credentials.
[vars]
# Permanent bootstrap admin - always resolves to role "admin" regardless
# of frontend/public/data/admins.json, so this account can never be
# locked out even if admins.json is missing, corrupted, or emptied.
# Additional admins/users are managed via the Admins page (admins.json).
ALLOWED_EMAIL = "abhishek.wadmare@gmail.com"
GOOGLE_CLIENT_ID = "841466924804-a9qu4pn9i35dbk5qlji3klcu2omu02s4.apps.googleusercontent.com"
GITHUB_OWNER = "abhishekwadmare"
GITHUB_REPO = "agastya"
GITHUB_BRANCH = "main"

# jobs.json / companies.json / alerts.json / applications.json all live
# in this R2 bucket instead of git - see the "Single source of truth"
# note in CLAUDE.md for why admins.json stays in git instead.
[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "agastya-data"

# GITHUB_TOKEN is a secret - set it with:
#   wrangler secret put GITHUB_TOKEN
# SCRAPER_API_KEY is a secret - set it with:
#   wrangler secret put SCRAPER_API_KEY
# (also needs to be added as a GitHub Actions secret with the same name,
# for scrape.yml to authenticate its jobs sync)
# RESEND_API_KEY is a secret - set it with:
#   wrangler secret put RESEND_API_KEY
