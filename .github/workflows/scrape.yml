name: Scrape jobs

on:
  # schedule:
  #   - cron: "0 */4 * * *"  # every 4 hours  -- paused 2026-07-04, see commit msg
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      # Plain checkout - the scraper only pulls its own source code from
      # here now. It no longer commits/pushes anything (jobs.json lives
      # in R2, pushed via the Worker's /api/scraper/sync-jobs), so the
      # ADMIN_PAT-authenticated checkout this used to need is gone - see
      # issue #7.
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        id: scrape
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python scraper/scrape.py

      - name: Send Telegram notifications for new jobs
        env:
          NEW_JOBS_COUNT: ${{ steps.scrape.outputs.new_jobs_count }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper/notify.py
